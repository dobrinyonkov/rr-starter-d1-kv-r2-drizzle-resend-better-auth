name: Preview DB Setup

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to set up preview DB for"
        required: false
        type: string

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: preview-db-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PREVIEW_D1_DATABASE_NAME: rr-starter-preview

jobs:
  setup-preview-db:
    name: Wipe & Migrate Preview DB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.head_ref || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wipe preview database
        run: |
          echo "Dropping all tables from preview database..."
          npx wrangler d1 execute "$PREVIEW_D1_DATABASE_NAME" --remote --command \
            "PRAGMA writable_schema = ON; DELETE FROM sqlite_master WHERE type IN ('table', 'index', 'trigger', 'view'); PRAGMA writable_schema = OFF; VACUUM;"
          echo "Preview database wiped."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Run migrations
        run: npx wrangler d1 migrations apply "$PREVIEW_D1_DATABASE_NAME" --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-db
          message: |
            **Preview DB** — Wiped and migrated for `${{ github.head_ref }}` @ `${{ github.event.pull_request.head.sha }}`

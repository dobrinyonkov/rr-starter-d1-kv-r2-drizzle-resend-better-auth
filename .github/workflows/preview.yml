name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy as preview"
        required: false
        type: string

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PREVIEW_D1_DATABASE_NAME: rr-starter-preview
  PREVIEW_D1_DATABASE_ID: 6da7137f-c60e-4c69-b8a5-19aad059e557
  PREVIEW_WORKER_NAME: rr-starter-preview

jobs:
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.head_ref || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wipe preview database
        run: |
          echo "Fetching table list..."
          TABLES=$(npx wrangler d1 execute "$PREVIEW_D1_DATABASE_NAME" --remote --command \
            "SELECT name FROM sqlite_master WHERE type='table' AND name NOT LIKE 'sqlite_%' AND name NOT LIKE '_cf_%';" \
            --json | jq -r '.[0].results[].name // empty' 2>/dev/null || echo "")

          if [ -z "$TABLES" ]; then
            echo "No tables to drop."
          else
            echo "Dropping tables: $TABLES"
            DROP_SQL=""
            for TABLE in $TABLES; do
              DROP_SQL="${DROP_SQL}DROP TABLE IF EXISTS \`${TABLE}\`;"
            done
            npx wrangler d1 execute "$PREVIEW_D1_DATABASE_NAME" --remote --command "$DROP_SQL"
            echo "Preview database wiped."
          fi

          # Clear migration tracking so migrations re-run from scratch
          npx wrangler d1 execute "$PREVIEW_D1_DATABASE_NAME" --remote --command \
            "DROP TABLE IF EXISTS d1_migrations; DROP TABLE IF EXISTS __drizzle_migrations;" || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Run migrations on preview database
        run: npx wrangler d1 migrations apply DB --remote --preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Patch wrangler.jsonc for preview deploy
        run: |
          # Swap database_id to the preview DB so the deployed Worker binds to it
          sed -i 's/"database_id": "[^"]*"/"database_id": "'"$PREVIEW_D1_DATABASE_ID"'"/' wrangler.jsonc

      - name: Build
        run: pnpm build

      - name: Deploy preview Worker
        id: deploy
        run: |
          DEPLOY_OUTPUT=$(npx wrangler deploy --name "$PREVIEW_WORKER_NAME" 2>&1) || true
          echo "$DEPLOY_OUTPUT"
          PREVIEW_URL=$(echo "$DEPLOY_OUTPUT" | grep -oE 'https://[^ ]+\.workers\.dev' | head -1)
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-deploy
          message: |
            ### Preview Deployment

            | | |
            |---|---|
            | **URL** | ${{ steps.deploy.outputs.preview_url || 'See Cloudflare dashboard' }} |
            | **Branch** | `${{ github.head_ref }}` |
            | **Commit** | `${{ github.sha }}` |
            | **Preview DB** | Wiped & migrated |
